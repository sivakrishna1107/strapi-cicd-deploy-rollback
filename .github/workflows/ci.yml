name: CI - Build and Push Image

on:
  push:
    branches: [main]
    paths:
      - "strapi-app/**"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      PROJECT_NAME: strapi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Ensure ECR Repository Exists
        run: |
          aws ecr describe-repositories --repository-names ${PROJECT_NAME}-repo-jayani || \
          aws ecr create-repository --repository-name ${PROJECT_NAME}-repo-jayani

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        id: build-image
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          REPO_NAME="${PROJECT_NAME}-repo-jayani"

          IMAGE_URI="$REGISTRY/$REPO_NAME:$IMAGE_TAG"

          echo "IMAGE_URI=$IMAGE_URI"

          docker build -t "$IMAGE_URI" ./strapi-app
          docker push "$IMAGE_URI"
