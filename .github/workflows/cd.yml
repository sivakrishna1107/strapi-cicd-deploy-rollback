name: CD - Blue Green Deployment

on:
  workflow_run:
    workflows: ["CI - Build & Push Image"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -----------------------------
      # Read Terraform Remote State
      # -----------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Read Terraform Outputs
        working-directory: terraform
        run: |
          echo "CLUSTER_NAME=$(terraform output -raw cluster_name)" >> $GITHUB_ENV
          echo "SERVICE_NAME=$(terraform output -raw service_name)" >> $GITHUB_ENV
          echo "TASK_FAMILY=$(terraform output -raw task_family)" >> $GITHUB_ENV
          echo "CODEDEPLOY_APP=$(terraform output -raw codedeploy_app_name)" >> $GITHUB_ENV
          echo "DEPLOYMENT_GROUP=$(terraform output -raw deployment_group_name)" >> $GITHUB_ENV
          echo "ECR_REPOSITORY=$(terraform output -raw ecr_repository_url)" >> $GITHUB_ENV
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
        
      - name: Get Current Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query "taskDefinition" \
            > taskdef.json

      - name: Update Image in Task Definition
        run: |
          jq --arg IMAGE "$ECR_REPOSITORY:${{ github.sha }}" \
            '.containerDefinitions[0].image = $IMAGE
            | del(.taskDefinitionArn,
                  .revision,
                  .status,
                  .requiresAttributes,
                  .compatibilities,
                  .registeredAt,
                  .registeredBy)' \
            taskdef.json > new-taskdef.json

      - name: Register Updated Task Definition
        run: |
          NEW_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file://new-taskdef.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "NEW_TASK_DEF=$NEW_TASK_DEF" >> $GITHUB_ENV

      # -----------------------------
      # Create AppSpec
      # -----------------------------
      - name: Create AppSpec
        run: |
          cat <<EOF > appspec.json
          {
            "version": 1,
            "Resources": [
              {
                "TargetService": {
                  "Type": "AWS::ECS::Service",
                  "Properties": {
                    "TaskDefinition": "$NEW_TASK_DEF",
                    "LoadBalancerInfo": {
                      "ContainerName": "strapi",
                      "ContainerPort": 1337
                    }
                  }
                }
              }
            ]
          }
          EOF

      # -----------------------------
      # Trigger CodeDeploy
      # -----------------------------
      - name: Create revision.json safely
        run: |
          jq -n \
            --arg content "$(cat appspec.json)" \
            '{
              revisionType: "AppSpecContent",
              appSpecContent: {
                content: $content
              }
            }' > revision.json

      - name: Trigger CodeDeploy Deployment and Monitor
        run: |
          DEPLOY_ID=$(aws deploy create-deployment \
            --application-name $CODEDEPLOY_APP \
            --deployment-group-name $DEPLOYMENT_GROUP \
            --deployment-config-name CodeDeployDefault.ECSCanary10Percent5Minutes \
            --revision file://revision.json \
            --query deploymentId \
            --output text)

          echo "Deployment ID: $DEPLOY_ID"

          # Wait until deployment finishes
          aws deploy wait deployment-successful --deployment-id $DEPLOY_ID